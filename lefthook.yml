# Lefthook configuration for KovitoBoard OSS release hygiene.
# See: DEC-012 (OSS release hygiene gate)

pre-commit:
  commands:
    license-header:
      # Auto-insert AGPL-3.0-or-later header into newly staged source files.
      # Idempotent: files that already contain `SPDX-License-Identifier` are
      # skipped. The script targets only the listed files (lefthook
      # `{staged_files}` integration). Modified files are re-staged via
      # `stage_fixed: true` so the commit captures the header.
      glob: "*.{ts,tsx,mjs,js}"
      run: node scripts/add-license-header.mjs {staged_files}
      stage_fixed: true

    hygiene-pii:
      # Personal information detection — always blocks commit
      run: node tools/check-release-hygiene.mjs --pii-only
      fail_text: |
        Personal information detected in staged files.
        Run `npm run check:hygiene` for details.

    hygiene-japanese:
      # Japanese character detection — warning only (does not block)
      run: node tools/check-release-hygiene.mjs --japanese-only || true

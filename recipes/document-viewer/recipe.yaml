---
recipeId: "document-viewer"
name: "ドキュメントビュアー"
description: "プロジェクト内の Markdown / HTML ファイルをツリー表示で一覧・閲覧する。ファイルをクリックすると本文がレンダリングされます（HTML は隔離された sandbox iframe 内で安全に表示）。"
version: "1.2.0"
author: "kovito-dev"
kovitoboard: ">=0.1.0"
tags: ["sample", "documents", "markdown", "html"]
i18n:
  en:
    name: "Document Viewer"
    description: "Browse and read the Markdown and HTML files in your project as a tree. Click a file to render its body (HTML renders inside an isolated sandbox iframe for safety)."
    menu:
      document-viewer:
        label: "Documents"

artifacts:
  - path: "pages/DocumentViewer.tsx"
    type: "page"
  - path: "pages/strings.ts"
    type: "lib"
  - path: "styles/document-viewer.css"
    type: "style"
  - path: "styles/highlight-atom-one-dark.css"
    type: "style"

menu:
  - id: "document-viewer"
    label: "ドキュメント"
    icon: "content"
    page: "pages/DocumentViewer"

api:
  scopes:
    - project-read
  calls:
    - id: list-docs
      handler: list-files
      args:
        path: "."
        recursive: true
    - id: read-doc
      handler: read-file
      args:
        path: "${input.path}"

instruction: |
  このレシピは Markdown / HTML ファイルの一覧・閲覧のみ行います。
  HTML は隔離された sandbox iframe（別 origin・スクリプト無効）内で
  表示し、DOMPurify を二次防御層として併用します。
  対象拡張子を変更したい場合は pages/DocumentViewer.tsx 内の
  EXTENSIONS 定数を編集してください。
---

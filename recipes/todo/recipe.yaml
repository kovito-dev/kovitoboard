---
recipeId: "todo"
name: "TODO 管理"
description: "シンプルな TODO リスト。タスクの追加・完了・削除ができます。データはこのレシピ専用領域に保存されます。"
version: "1.0.0"
author: "kovito-dev"
kovitoboard: ">=0.1.0"
tags: ["sample", "productivity", "todo"]
i18n:
  en:
    name: "Todo List"
    description: "A simple todo list. Add, complete, and delete tasks. Data lives in this recipe's private area."

artifacts:
  - path: "pages/TodoPage.tsx"
    type: "page"

menu:
  - id: "todo"
    label: "TODO"
    icon: "content"
    page: "pages/TodoPage"

api:
  scopes:
    - own-data
  calls:
    - id: list-tasks
      handler: kv-list
      args:
        prefix: "task:"
    - id: get-task
      handler: kv-get
      args:
        key: "${input.key}"
    - id: save-task
      handler: kv-set
      args:
        key: "${input.key}"
        value: "${input.value}"
    - id: delete-task
      handler: kv-delete
      args:
        key: "${input.key}"

instruction: |
  TODO データは app/data/todo/ 配下の KV ストアに保存されます。
  デザイン（色・余白等）を変更したい場合は pages/TodoPage.tsx の Tailwind クラスを編集してください。
---

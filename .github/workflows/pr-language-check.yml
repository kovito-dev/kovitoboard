name: PR Language Check

# Detect Japanese characters (hiragana, katakana, CJK ideographs) in PR title
# and body. The KovitoBoard OSS repository requires English-only PR metadata.
#
# This workflow is intentionally separate from `ci.yml` so that PR-metadata
# events (`edited` / `labeled` / `unlabeled`) do not trigger the heavier hygiene
# / typecheck / build / test jobs in `ci.yml`. Those jobs only need to run on
# code-changing events (`opened` / `synchronize` / `reopened`).
#
# Bypass: applying the `lang-exception-approved` label skips this check. The
# workflow does not verify who applied the label; control over who can add
# labels is governed by GitHub repository permissions (configure label-write
# access via the repo settings to restrict bypass authority).

on:
  pull_request:
    types: [opened, edited, reopened, labeled, unlabeled]
    branches: [main, staging]

jobs:
  language-check:
    name: PR Language Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # required for posting fail comments
      contents: read
    steps:
      - name: Check for bypass label
        id: check-bypass
        env:
          LABELS_JSON: ${{ toJSON(github.event.pull_request.labels) }}
        run: |
          LABELS=$(echo "$LABELS_JSON" | jq -r '.[].name')
          if echo "$LABELS" | grep -qx 'lang-exception-approved'; then
            echo "bypass=true" >> "$GITHUB_OUTPUT"
            echo "Bypass: lang-exception-approved label present, skipping check"
          else
            echo "bypass=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Japanese in title/body
        if: steps.check-bypass.outputs.bypass != 'true'
        id: detect
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python3 <<'PY'
          import os, re, json

          title = os.environ.get('PR_TITLE', '') or ''
          body = os.environ.get('PR_BODY', '') or ''

          # Hiragana (U+3040-U+309F) + Katakana (U+30A0-U+30FF) + CJK Unified
          # Ideographs (U+4E00-U+9FFF). Same range as
          # tools/check-release-hygiene.mjs JAPANESE_RE and
          # .claude/rules/pr-operations.md v1.3 §3.4 self-check.
          pattern = re.compile(r'[぀-ゟ゠-ヿ一-鿿]')

          title_has_jp = bool(pattern.search(title))
          body_lines = []
          for i, line in enumerate(body.split('\n'), 1):
              if pattern.search(line):
                  snippet = line[:80] + ('...' if len(line) > 80 else '')
                  body_lines.append(f'L{i}: {snippet}')

          fail = title_has_jp or bool(body_lines)
          report = {
              'fail': fail,
              'title_snippet': (
                  (title[:80] + '...') if title_has_jp and len(title) > 80
                  else (title if title_has_jp else '')
              ),
              # Cap body lines at 10 to bound comment size and noise.
              'body_lines': body_lines[:10],
              'body_lines_truncated': len(body_lines) > 10,
          }

          out_path = os.environ['GITHUB_OUTPUT']
          with open(out_path, 'a') as f:
              f.write(f"fail={'true' if fail else 'false'}\n")
              f.write('report<<REPORT_EOF\n')
              f.write(json.dumps(report))
              f.write('\nREPORT_EOF\n')

          if fail:
              print('FAIL: Japanese characters detected in PR title or body')
              print(json.dumps(report, indent=2))
          else:
              print('OK: title and body are English-only')
          PY

      - name: Compose fail comment body
        if: steps.detect.outputs.fail == 'true' && github.event.pull_request.head.repo.fork == false
        id: compose
        env:
          REPORT: ${{ steps.detect.outputs.report }}
        run: |
          BODY=$(python3 <<'PY'
          import os, json, html, textwrap

          r = json.loads(os.environ['REPORT'])

          # HTML-escape user-supplied snippets and wrap them in <code> elements
          # so that crafted PR title / body cannot inject Markdown, mentions,
          # or HTML into this bot-authored comment.
          if r['title_snippet']:
              title_line = '<code>' + html.escape(r['title_snippet']) + '</code>'
          else:
              title_line = '<em>no Japanese in title</em>'

          if r['body_lines']:
              items = ''.join(
                  f'<li><code>{html.escape(line)}</code></li>'
                  for line in r['body_lines']
              )
              if r['body_lines_truncated']:
                  items += '<li><em>... additional body lines truncated</em></li>'
              body_block = '<ul>' + items + '</ul>'
          else:
              body_block = '<em>no Japanese in body</em>'

          # Use textwrap.dedent so any future indentation accidents inside the
          # template do not turn the rendered comment into an indented code
          # block. Note: YAML `run: |` strips the common leading indent before
          # invoking the shell, but defending against in-template drift is
          # cheap and prevents subtle rendering regressions.
          template = textwrap.dedent("""\
              <!-- pr-language-check-fail -->
              ## :warning: Language check failed

              This PR's title or body contains Japanese characters (hiragana, katakana, or CJK ideographs). The KovitoBoard OSS repository requires all PR title, body, and comment text to be written in **English**, as defined in the contributor language policy.

              ### Detected locations

              <details>
              <summary>Click to expand</summary>

              - **Title:** {title_line}
              - **Body:** {body_block}

              </details>

              ### How to fix

              1. Edit this PR's title and body via `gh pr edit <pr-number> --title "<english title>" --body "<english body>"` or via the GitHub UI.
              2. The `pull_request: edited` event will retrigger this check automatically.
              3. The check will turn green once all Japanese characters are removed.

              ### Exception

              If the Japanese characters are intentional and approved by a repository maintainer, add the `lang-exception-approved` label to bypass this check. The workflow honors the label without verifying who applied it; restrict label-write access via the repository settings to control bypass authority.

              ---

              :robot: Posted automatically by the `pr-language-check` workflow.
          """).format(title_line=title_line, body_block=body_block)

          print(template)
          PY
          )
          # Use a heredoc-style multiline GITHUB_OUTPUT to preserve newlines.
          {
            echo 'comment_body<<COMMENT_EOF'
            echo "$BODY"
            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post or update fail comment (gh CLI)
        if: steps.detect.outputs.fail == 'true' && github.event.pull_request.head.repo.fork == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMENT_BODY: ${{ steps.compose.outputs.comment_body }}
          # GITHUB_REPOSITORY is "owner/repo" — pass it via --repo so gh CLI
          # does not need a local git context (we skip actions/checkout to
          # keep this workflow lightweight).
          REPO: ${{ github.repository }}
        run: |
          # Deduplicate by the <!-- pr-language-check-fail --> HTML marker:
          # repeated `edited` / `labeled` / `unlabeled` events update the same
          # comment in place rather than appending a fresh comment each time.
          # `head -1` defends against multiple legacy comments sharing the
          # marker — any extra ones are left untouched as historical record.
          EXISTING=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body // "" | startswith("<!-- pr-language-check-fail -->")) | .id' \
            | head -1)

          if [ -n "$EXISTING" ]; then
            echo "Updating existing language-check comment id=$EXISTING"
            gh api -X PATCH "repos/$REPO/issues/comments/$EXISTING" \
              -f body="$COMMENT_BODY" >/dev/null
          else
            echo "Posting new language-check comment"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$COMMENT_BODY"
          fi

      - name: Note skipped comment for fork PR
        if: steps.detect.outputs.fail == 'true' && github.event.pull_request.head.repo.fork == true
        run: |
          echo "::warning::Japanese characters detected, but this PR is from a fork."
          echo "::warning::Auto-comment skipped because secrets.GITHUB_TOKEN is read-only on fork PRs."
          echo "::warning::The check will fail; the contributor must edit the PR title/body to remove Japanese characters."

      - name: Fail the job
        if: steps.detect.outputs.fail == 'true'
        run: |
          echo "::error::PR title or body contains Japanese characters. See the language-check comment for details."
          exit 1

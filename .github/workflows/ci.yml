name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  hygiene:
    name: Release Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      # Hygiene check does not need node_modules — it only uses Node built-ins
      - name: Check release hygiene
        run: node tools/check-release-hygiene.mjs --strict
        # --strict: treat Japanese warnings as errors (CI policy)

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Run unit tests
        run: npm run test

  l1-e2e:
    name: L1 E2E
    # TODO(BL-2026-083, DEC-022): Re-enable after v0.1.0 release.
    # Temporarily disabled during v0.1.0 focused fixes period (2026-05-02-).
    # Local L1 full pass is required before manual integration test on release day.
    if: false
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run L1 E2E tests
        run: npm run test:e2e:l1
        env:
          CI: true

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-l1
          path: |
            test-results/
            playwright-report/
          retention-days: 7

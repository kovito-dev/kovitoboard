name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  hygiene:
    name: Release Hygiene
    runs-on: ubuntu-latest
    # Source-only checks (Japanese / PII / meta-note / internal IDs)
    # run without `node_modules`. The post-build half (H-CR2
    # top-level await + H-CR4 atomicity, spec v1.7 §6.10.6.17
    # H-CR5-A) lives in `hygiene-post-build` so it can consume the
    # Vite production manifest.
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      # Hygiene check does not need node_modules — it only uses Node built-ins
      - name: Check release hygiene
        run: node tools/check-release-hygiene.mjs --strict
        # --strict: treat Japanese warnings as errors (CI policy)

  hygiene-post-build:
    name: Release Hygiene (post-build)
    runs-on: ubuntu-latest
    # Spec v1.7 §6.10.6.17: the post-build gate consumes the Vite
    # production manifest to walk the host bootstrap chain, so it
    # must run after the build artifacts have been produced.
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Check post-build hygiene
        run: node tools/check-release-hygiene.mjs --post-build-only

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Run unit tests
        run: npm run test

  l1-e2e:
    name: L1 E2E
    # Branch-scoped execution: run only on pushes to the integration branches
    # (staging / main) as a post-merge integration check. Pull requests keep
    # the fast feedback matrix (typecheck / build / unit tests / hygiene);
    # pre-merge required-status-check enforcement is configured via repo
    # branch protection, not in this workflow.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run L1 E2E tests
        run: npm run test:e2e:l1
        env:
          CI: true

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-l1
          path: |
            test-results/
            playwright-report/
          retention-days: 7
